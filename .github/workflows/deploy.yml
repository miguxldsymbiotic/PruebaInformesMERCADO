name: Azure Web App Deployment (Publish Profile)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          # Usamos el nombre exacto que sale en tu perfil de publicación
          app-name: informepdf-free
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
